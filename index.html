<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trắc nghiệm</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: auto;
}
h2 {
    text-align: center;
}
.question {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
button {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    border: none;
    border-radius: 8px;
    text-align: left;
    background: #eef1f5;
    transition: 0.3s;
}
button:hover {
    background: #dfe6ee;
}
.correct {
    background: #c8f7c5 !important;
    color: green;
    font-weight: bold;
}
.wrong {
    background: #f7c5c5 !important;
    color: red;
    font-weight: bold;
}
.score {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
}
.progress {
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}
.progress-bar {
    height: 10px;
    width: 0%;
    background: #4CAF50;
}
</style>
</head>

<body>

<div class="container">
<h2>Bài trắc nghiệm</h2>

<div class="score" id="score">Điểm: 0</div>

<div class="progress">
    <div class="progress-bar" id="progress"></div>
</div>

<div id="quiz"></div>
</div>

<script>

// 🔀 Shuffle chuẩn
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

let score = 0;
let answered = 0;

answers: [

],
correct: 1
},

{

answers: [

],
correct: 1
},

answers: [
"Về đẩy mạnh xây dựng, chỉnh đốn đảng; kiên quyết ngăn chặn, đẩy lùi, xử lý nghiêm cán bộ, đảng viên suy thoái về tư tưởng chính trị, đạo đức, lối sống, biểu hiện “tự diễn biến”, “tự chuyển hoá”.",
"Về đẩy mạnh xây dựng, chỉnh đốn đảng và hệ thống chính trị; ngăn chặn, đẩy lùi, xử lý nghiêm cán bộ, đảng viên suy thoái về tư tưởng chính trị, đạo đức, lối sống, biểu hiện “tự diễn biến”, “tự chuyển hoá”.",
"Về đẩy mạnh xây dựng, chỉnh đốn đảng và hệ thống chính trị; kiên quyết ngăn chặn, đẩy lùi, xử lý nghiêm cán bộ, đảng viên suy thoái về tư tưởng chính trị, đạo đức, lối sống, biểu hiện “tự diễn biến”, “tự chuyển hoá”.",
"Về đẩy mạnh xây dựng, chỉnh đốn đảng và hệ thống chính trị; kiên quyết đẩy lùi, xử lý nghiêm cán bộ, đảng viên suy thoái về tư tưởng chính trị, đạo đức, lối sống, biểu hiện “tự diễn biến”, “tự chuyển hoá”."
],

{

"04 nội dung",

{
q: "Đồng chí cho biết có mấy nguyên tắc tiến hành công tác tuyên truyền miệng?",
answers: [

"06 nhiệm vụ",
"10 nhiệm vụ"
],

},

{
q: "Đồng chí khái niệm của công tác tuyên truyền miệng là gì?",
answers: [

"Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua sự giao tiếp bằng lời nói trực tiếp giữa người nói (nhà tuyên truyền) với người nghe (đối tượng tuyên truyền).",
"Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua sự giao tiếp thực tiễn bằng lời nói trực tiếp giữa người nói (nhà tuyên truyền) với người nghe (đối tượng tuyên truyền).",
"Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua nói chuyện bằng lời nói trực tiếp giữa người nói (nhà tuyên truyền) với người nghe (đối tượng tuyên truyền)."
],
correct: 1
},

{
q: "Đồng chí cho biết chức năng Phòng Hồ Chí Minh theo Quy chế tổ chức hoạt động của các thiết chế văn hóa trong Quân đội nhân dân Việt Nam?",
answers: [
"Tổ chức các hoạt động văn hoá - văn nghệ phục vụ nhiệm vụ chính trị của đơn vị và nhu cầu đời sống văn hóa, tinh thần của bộ đội",
"Hướng dẫn, tổ chức các hoạt động văn hoá - văn nghệ phục vụ nhiệm vụ chính trị của đơn vị và nhu cầu đời sống văn hóa, tinh thần của bộ đội.",
"Chỉ đạo, tổ chức các hoạt động văn hoá - văn nghệ phục vụ nhiệm vụ chính trị của đơn vị và nhu cầu đời sống văn hóa, tinh thần của bộ đội.",
"Tham gia, tổ chức, hướng dẫn các hoạt động văn hoá - văn nghệ phục vụ nhiệm vụ chính trị của đơn vị và nhu cầu đời sống văn hóa, tinh thần của bộ đội."
],
correct: 1
},

{
q: "Đồng chí cho biết báo cáo viên kiêm nhiệm ở cấp tiểu đoàn, đại đội và đương đương là ai?",
answers: [
"Chính trị viên đảm nhiệm",
"Chính trị viên hoặc Chính trị viên phó đảm nhiệm",
"Bí thư Đảng ủy (chi bộ) đảm nhiệm",
"Bí thư hoặc phó bí thư Đảng ủy (chi bộ) đảm nhiệm"
],
correct: 1
}
];

// 🔀 Trộn câu hỏi
shuffle(questions);

const quizDiv = document.getElementById("quiz");

// 👉 Render câu hỏi
questions.forEach((q, index) => {

    const div = document.createElement("div");
    div.classList.add("question");

    const title = document.createElement("p");
    title.innerHTML = "<b>Câu " + (index + 1) + ":</b> " + q.q;
    div.appendChild(title);

    // 👉 GẮN ĐÚNG/SAI + TRỘN ĐÁP ÁN
    let answers = q.answers.map((a,i)=>({
        text: a,
        correct: i === q.correct
    }));

    shuffle(answers);

    answers.forEach((ans, i) => {

        const btn = document.createElement("button");
        btn.innerText = String.fromCharCode(65+i) + ". " + ans.text;

        btn.onclick = () => {

            if(div.classList.contains("done")) return;
            div.classList.add("done");

            answered++;

            if(ans.correct){
                btn.classList.add("correct");
                btn.innerText += " ✅";
                score++;
            } else {
                btn.classList.add("wrong");
                btn.innerText += " ❌";

                // 👉 HIỆN ĐÁP ÁN ĐÚNG
                const buttons = div.querySelectorAll("button");
                answers.forEach((a, idx) => {
                    if(a.correct){
                        buttons[idx].classList.add("correct");
                        buttons[idx].innerText += " ⭐";
                    }
                });
            }

            // 👉 CẬP NHẬT ĐIỂM
            document.getElementById("score").innerText =
                "Điểm: " + score + "/" + questions.length;

            // 👉 PROGRESS BAR
            document.getElementById("progress").style.width =
                (answered / questions.length * 100) + "%";
        };

        div.appendChild(btn);
    });

    quizDiv.appendChild(div);
});

</script>

</body>
